# ============================================================================
# PerceptFence — Serena Configuration
# EB1A C5 paper — research code and supplements
# ============================================================================

project_name: PerceptFence

languages:
- python
- markdown

encoding: utf-8

ignore_all_files_in_gitignore: true

ignored_paths:
- .git
- node_modules
- .venv
- venv
- __pycache__
- "*.egg-info"
- .mypy_cache
- .pytest_cache
- "*.aux"
- "*.bbl"
- "*.blg"
- "*.log"
- "*.out"
- "*.toc"

read_only: false

excluded_tools: []
included_optional_tools: []
fixed_tools: []

base_modes:
default_modes:
added_modes:

initial_prompt: |
  ## PerceptFence — EB1A C5 paper

  **Purpose**: Research paper and accompanying code/eval for EB1A criterion C5
  (original contribution of major significance).
  **Stack**: Python research code + Markdown writing.

  ### Layout
  - `src/` — research code
  - `eval/` — evaluation
  - `policies/` — policy boundaries / threat model docs
  - `docs/`, `supplement/` — paper supplements
  - `PROJECT.md`, `SECURITY.md`, `policy-boundaries.md` — project-level docs
  - `CITATION.cff` — citation metadata

  ### When working here
  Edits affect EB1A case evidence. Preserve provenance — check the eb1a skill's
  evidence tracker before changing factual or experimental claims.

read_only_memory_patterns: []
ignored_memory_patterns: []

ls_specific_settings: {}
language_backend:
line_ending:
symbol_info_budget:
